# Maven Wrapper configuration.
# On first run the wrapper scripts download the specified Maven distribution
# and the wrapper JAR into ~/.m2/wrapper/ and reuse them on subsequent runs.
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.6/apache-maven-3.9.6-bin.zip
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.1/maven-wrapper-3.3.1.jar
