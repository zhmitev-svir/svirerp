# ─────────────────────────────────────────────────────────────────
# DataSource – copy real credentials to application-local.properties
# (gitignored) and activate with --spring.profiles.active=local
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/svirerp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────────────────────────
# JPA / Hibernate
# Flyway owns all DDL; Hibernate must never alter the schema.
# "validate" confirms that entity mappings match the migrated schema.
# ─────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# MySQL 8 dialect is auto-detected but stated explicitly for clarity
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Store Java UUID fields as CHAR(36) to match the CHAR(36) columns in the schema.
# Without this, Hibernate 6 may attempt BINARY(16) storage on MySQL.
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Force all DATETIME reads/writes through UTC so OffsetDateTime values are
# consistent regardless of the JVM's default timezone.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─────────────────────────────────────────────────────────────────
# Flyway – Spring Boot auto-configures Flyway from these keys
# ─────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─────────────────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────────────────
server.port=8080
