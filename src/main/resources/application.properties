# ─────────────────────────────────────────────────────────────────────────────
# DataSource
#
# Credentials are read from environment variables so that nothing sensitive is
# stored in source control.  For local development copy
# application-local.properties.example → application-local.properties and fill
# in the values; that file is gitignored.
#
# To activate the local profile:
#   java -jar svirerp.jar --spring.profiles.active=local
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# For production supply the env vars (or equivalent secrets mechanism):
#   SVIRERP_DB_URL, SVIRERP_DB_USER, SVIRERP_DB_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${SVIRERP_DB_URL:jdbc:mysql://localhost:3306/svirerp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SVIRERP_DB_USER:root}
spring.datasource.password=${SVIRERP_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────────────────────────────────────
# JPA / Hibernate
# Flyway owns all DDL; Hibernate must never alter the schema.
# "validate" confirms that entity mappings match the migrated schema.
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# MySQL 8 dialect is auto-detected but stated explicitly for clarity
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Store Java UUID fields as CHAR(36) to match the CHAR(36) columns in the schema.
# Without this, Hibernate 6 may attempt BINARY(16) storage on MySQL.
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Force all DATETIME reads/writes through UTC so OffsetDateTime values are
# consistent regardless of the JVM's default timezone.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─────────────────────────────────────────────────────────────────────────────
# Flyway — Spring Boot auto-configures Flyway from these keys
# ─────────────────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─────────────────────────────────────────────────────────────────────────────
# Server
#
# forward-headers-strategy=framework makes Spring trust the X-Forwarded-Proto/
# Host/Port headers a reverse proxy (Caddy, nginx, etc.) sets in front of this
# app. Without it, request.getScheme()/{baseUrl} resolve using the internal
# plain-HTTP connection the proxy makes to this app, not the public HTTPS URL
# the browser actually used — breaking OAuth2's {baseUrl} redirect-URI
# template (redirect_uri_mismatch against what's registered with the provider)
# and any other absolute-URL generation. No effect when accessed directly
# (local dev) since there are no forwarded headers to trust.
# ─────────────────────────────────────────────────────────────────────────────
server.forward-headers-strategy=framework
server.port=8080

# ─────────────────────────────────────────────────────────────────────────────
# CORS — the Angular UI runs on its own dev-server origin, so every request
# from the browser to this API is cross-origin. Comma-separate multiple origins.
# ─────────────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${SVIRERP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─────────────────────────────────────────────────────────────────────────────
# Authentication — Google OAuth2 login restricted to the org's Workspace
# domain, plus a break-glass local admin login for when Google is unavailable.
#
# Google: create an OAuth 2.0 Client (Web application) in Google Cloud Console
# with authorized redirect URI {baseUrl}/login/oauth2/code/google, and set the
# consent screen's User Type to "Internal" to restrict sign-in to the
# Workspace org at Google's level. Unlike everything else in this file, the
# client ID/secret are NOT properties — they're configured at runtime via the
# admin-only Settings page (see org.svir...settings package) and stored in the
# app_setting DB table (encrypted for the secret), so they can be rotated
# without a restart. Log in as the local admin first to set them.
#
# Local admin: blank by default, meaning the fallback login is inactive until
# both properties below are set. The password is never stored in plaintext —
# app.auth.admin.password-hash must be a bcrypt hash (e.g. generated once via
# a throwaway `new BCryptPasswordEncoder().encode("...")` call).
# ─────────────────────────────────────────────────────────────────────────────
app.auth.google.allowed-domain=${SVIRERP_GOOGLE_ALLOWED_DOMAIN:svivanrilski.com}

app.auth.admin.username=${SVIRERP_ADMIN_USERNAME:}
app.auth.admin.password-hash=${SVIRERP_ADMIN_PASSWORD_HASH:}

# ─────────────────────────────────────────────────────────────────────────────
# App settings encryption — SECRET-type rows in the app_setting table (e.g.
# the Google OAuth client secret, now configured via the admin-only Settings
# page instead of a property) are encrypted at rest with these two values.
# Both are required for SECRET settings to work at all; losing either one
# permanently strands every already-encrypted value, the same way losing a
# bcrypt hash's plaintext does — there is no recovery path, so store them
# somewhere durable (a password manager / secrets vault), not just an env var
# on one machine.
#
# app.settings.encryption-salt must be a hex-encoded string (e.g. generate 16
# random bytes and hex-encode them) — Spring's Encryptors.text() decodes it
# as hex, not plain text.
# ─────────────────────────────────────────────────────────────────────────────
app.settings.encryption-key=${SVIRERP_SETTINGS_ENCRYPTION_KEY:}
app.settings.encryption-salt=${SVIRERP_SETTINGS_ENCRYPTION_SALT:}
